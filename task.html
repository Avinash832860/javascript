<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Four</title>

<style>
.container{
    width:800px;
    border:2px solid grey;
}

/* Top section (Logo + Banner) */
.top{
    display:flex;
}

.logo{
    width:30%;
    background:skyblue;
    border-right:2px solid black;
    padding:20px;
    text-align:center;
}

.banner{
    width:70%;
    background:skyblue;
    padding:20px;
    text-align:center;
}
.head-link{
    background:skyblue;
    text-align:center;
    padding:10px;
    border-top:2px solid grey;
    border-bottom:2px solid grey;
}
.middle{
    display:flex;
    height:300px;
}

.left{
    border-right: 1px solid black;
    width:200px;
    display:flex;
    justify-content:center;
    align-items:center;
}
.right{
    border-left: 1px solid black;
    width:200px;
    display:flex;
    justify-content:center;
    align-items:center;
}
.content{
    width:60%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.footer{
    background:red;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<div class="container">

    <div class="top">
        <div class="logo">LOGO</div>
        <div class="banner">BANNER</div>
    </div>

    <div class="head-link">HEAD-LINK</div>

    <div class="middle">
        <div class="left">Left</div>
        <div class="content">Content</div>
        <div class="right">Right</div>
    </div>

    <div class="footer">Footer</div>

</div>

</body>
</html>
